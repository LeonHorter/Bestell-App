<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestellAPP</title>
    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/variables.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/basket.css">
    <link rel="stylesheet" href="style.css">
    <script src="./scripts/db.js" defer></script>
    <script src="./scripts/templates.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <header class="mainHeader">
        <div class="contentWrapper headerContent">
            <a href="index.html"><img src="./assets/icons/logo.svg" alt="BestellAPP-Logo"></a>
            <button class="menuBtn"></button>
        </div>
    </header>
    <main>
        <section id="hero">
            <img src="./assets/img/hero.png" alt="Titelbild" class="heroImg">
            <img src="./assets/img/burger_logo.png" alt="Restaurant-Logo" class="restaurantLogoImg">
            <div class="contentWrapper heroContent">
                <h1><span class="orangeHeadline">Burger</span>House</h1>
                <p class="heroText">The best of Burgers, Pizza, and Greens, all in one great place.</p>
            </div>
        </section>
    </main>
    <footer class="mainFooter">
        <div class="contentWrapper footerContent">
            <figure>
                <img src="./assets/icons/copyright.svg" alt="Copyright-Logo">
                <figcaption>2025 BurgerHouse</figcaption>
            </figure>
            <p>Imprint</p>
            <p>Cookie Preferences</p>
        </div>
    </footer>
</body>
</html>
